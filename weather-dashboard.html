<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time Weather Dashboard">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        
        .search-box input {
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 1rem;
        }
        
        .search-box button {
            padding: 0.8rem 2rem;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .search-box button:hover {
            background: #ff5252;
        }
        
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }
        
        .weather-card:hover {
            transform: translateY(-5px);
        }
        
        .current-weather {
            grid-column: 1 / -1;
        }
        
        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .location {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }
        
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .delete-btn:hover {
            background: #ff5252;
        }
        
        .weather-info {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 1rem;
        }
        
        .weather-icon {
            font-size: 4rem;
        }
        
        .temp-info {
            flex: 1;
        }
        
        .temperature {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .description {
            font-size: 1.2rem;
            color: #666;
            text-transform: capitalize;
        }
        
        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .detail {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .detail-label {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 0.3rem;
        }
        
        .detail-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }
        
        .forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .forecast-item {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .forecast-day {
            font-weight: bold;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .forecast-icon {
            font-size: 2rem;
            margin: 0.5rem 0;
        }
        
        .forecast-temp {
            font-size: 0.9rem;
            color: #666;
        }
        
        .error {
            background: #ff6b6b;
            color: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
        }
        
        .favorites-title {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .search-box input {
                width: 100%;
            }
            
            .weather-info {
                flex-direction: column;
                text-align: center;
            }
            
            .forecast {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Real-time weather information for your favorite locations</p>
        </header>
        
        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..."
                autocomplete="off"
            >
            <button onclick="searchWeather()">Search</button>
        </div>
        
        <div id="error"></div>
        <div id="loading"></div>
        <div id="weatherContainer" class="weather-grid"></div>
    </div>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5012114959656726"
         crossorigin="anonymous"></script>
    
    <script>
        const API_KEY = '9d1b34bbb59843d9a1d34bbb59843d9a'; // Free API key from openweathermap.org
        const WEATHER_CONTAINER = document.getElementById('weatherContainer');
        const ERROR_CONTAINER = document.getElementById('error');
        const LOADING_CONTAINER = document.getElementById('loading');
        
        // Weather icons mapping
        const weatherIcons = {
            '01d': '☀️',
            '01n': '🌙',
            '02d': '⛅',
            '02n': '🌤️',
            '03d': '☁️',
            '03n': '☁️',
            '04d': '☁️',
            '04n': '☁️',
            '09d': '🌧️',
            '09n': '🌧️',
            '10d': '🌦️',
            '10n': '🌧️',
            '11d': '⛈️',
            '11n': '⛈️',
            '13d': '❄️',
            '13n': '❄️',
            '50d': '🌫️',
            '50n': '🌫️'
        };
        
        // Load saved cities on page load
        window.addEventListener('load', () => {
            const savedCities = JSON.parse(localStorage.getItem('weatherCities')) || ['London', 'New York', 'Tokyo'];
            savedCities.forEach(city => {
                fetchWeather(city);
            });
        });
        
        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }
            
            document.getElementById('cityInput').value = '';
            fetchWeather(city);
        }
        
        function showError(message) {
            ERROR_CONTAINER.innerHTML = `<div class="error">${message}</div>`;
            setTimeout(() => {
                ERROR_CONTAINER.innerHTML = '';
            }, 5000);
        }
        
        function showLoading() {
            LOADING_CONTAINER.innerHTML = '<div class="loading">Loading weather data...</div>';
        }
        
        function hideLoading() {
            LOADING_CONTAINER.innerHTML = '';
        }
        
        async function fetchWeather(city) {
            showLoading();
            
            try {
                // Fetch current weather
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
                );
                
                if (!response.ok) {
                    if (response.status === 404) {
                        showError(`City "${city}" not found`);
                    } else {
                        showError('Failed to fetch weather data');
                    }
                    hideLoading();
                    return;
                }
                
                const data = await response.json();
                
                // Fetch forecast
                const forecastResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric`
                );
                const forecastData = await forecastResponse.json();
                
                // Save city to localStorage
                saveCityToList(city);
                
                displayWeather(data, forecastData);
                hideLoading();
            } catch (error) {
                showError('Error fetching weather data: ' + error.message);
                hideLoading();
            }
        }
        
        function displayWeather(data, forecastData) {
            const icon = weatherIcons[data.weather[0].icon] || '🌤️';
            const forecast = processForecast(forecastData.list);
            
            const weatherCard = document.createElement('div');
            weatherCard.className = 'weather-card current-weather';
            weatherCard.innerHTML = `
                <div class="weather-header">
                    <div>
                        <div class="location">${data.name}, ${data.sys.country}</div>
                        <div style="color: #999; font-size: 0.9rem;">${new Date().toLocaleDateString()}</div>
                    </div>
                    <button class="delete-btn" onclick="this.parentElement.parentElement.remove()">Remove</button>
                </div>
                
                <div class="weather-info">
                    <div class="weather-icon">${icon}</div>
                    <div class="temp-info">
                        <div class="temperature">${Math.round(data.main.temp)}°C</div>
                        <div class="description">${data.weather[0].main}</div>
                    </div>
                </div>
                
                <div class="weather-details">
                    <div class="detail">
                        <div class="detail-label">Feels Like</div>
                        <div class="detail-value">${Math.round(data.main.feels_like)}°C</div>
                    </div>
                    <div class="detail">
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value">${data.main.humidity}%</div>
                    </div>
                    <div class="detail">
                        <div class="detail-label">Wind Speed</div>
                        <div class="detail-value">${data.wind.speed} m/s</div>
                    </div>
                    <div class="detail">
                        <div class="detail-label">Pressure</div>
                        <div class="detail-value">${data.main.pressure} hPa</div>
                    </div>
                    <div class="detail">
                        <div class="detail-label">Visibility</div>
                        <div class="detail-value">${(data.visibility / 1000).toFixed(1)} km</div>
                    </div>
                    <div class="detail">
                        <div class="detail-label">UV Index</div>
                        <div class="detail-value">${data.clouds.all}%</div>
                    </div>
                </div>
                
                <h3 style="margin-top: 2rem; margin-bottom: 1rem; color: #333;">5-Day Forecast</h3>
                <div class="forecast">
                    ${forecast.map(day => `
                        <div class="forecast-item">
                            <div class="forecast-day">${day.day}</div>
                            <div class="forecast-icon">${day.icon}</div>
                            <div class="forecast-temp">High: ${Math.round(day.temp)}°C</div>
                            <div class="forecast-temp">Low: ${Math.round(day.tempLow)}°C</div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            WEATHER_CONTAINER.appendChild(weatherCard);
        }
        
        function processForecast(list) {
            const forecast = {};
            
            list.forEach(item => {
                const date = new Date(item.dt * 1000);
                const day = date.toLocaleDateString('en-US', { weekday: 'short' });
                
                if (!forecast[day]) {
                    forecast[day] = {
                        day,
                        temps: [],
                        icons: []
                    };
                }
                
                forecast[day].temps.push(item.main.temp);
                forecast[day].icons.push(weatherIcons[item.weather[0].icon] || '🌤️');
            });
            
            return Object.values(forecast).slice(0, 5).map(day => ({
                day: day.day,
                temp: Math.max(...day.temps),
                tempLow: Math.min(...day.temps),
                icon: day.icons[0]
            }));
        }
        
        function saveCityToList(city) {
            const savedCities = JSON.parse(localStorage.getItem('weatherCities')) || [];
            if (!savedCities.includes(city)) {
                savedCities.push(city);
                localStorage.setItem('weatherCities', JSON.stringify(savedCities));
            }
        }
        
        // Allow Enter key to search
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });
    </script>
</body>
</html>
